<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Temas</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>🎨 Sistema de Temas</h1>

        <p class="subtitle">
            Experiência de Usuário com BOM e Persistência
        </p>

        <div class="card">

            <h2>Tema Atual</h2>

            <p id="theme-name">
                Carregando...
            </p>

            <p id="theme-origin"></p>

            <p id="last-update"></p>

        </div>

        <div class="buttons">

            <button id="light-btn">
                ☀️ Light
            </button>

            <button id="dark-btn">
                🌙 Dark
            </button>

            <button id="auto-btn">
                💻 Auto
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
